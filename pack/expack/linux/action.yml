name: Sign and EX-Pack ( Linux )
description: Sign or Pack the .DEB .ZST(Arch) .RPM .TAR.GZ of Linux Package

inputs:
  gpg_key:
    required: true
  out_path:
    required: true

runs:
  using: composite

  steps:
    - name: Prepare to Sign
      shell: bash
      run: echo "${{ inputs.gpg_key }}" | gpg --import

    - name: Package for Arch ( Linux )
      working-directory: ${{ github.action_path }}/arch
      shell: bash
      run: |
        find $GITHUB_WORKSPACE/out -print
        mkdir tmp
        cp pkg.sh ./tmp/
        cp $GITHUB_WORKSPACE/build/PKGBUILD ./tmp/
        cp -a $GITHUB_WORKSPACE/out/install/ ./tmp/install/
        docker build -f Dockerfile --output type=local,dest=${{ inputs.out_path }} .

    - name: Sign Software
      shell: bash
      working-directory: ${{ inputs.out_path }}
      run: |
        KEY_ID=$(gpg --list-secret-keys --keyid-format LONG | awk '/sec/{print $2}' | cut -d'/' -f2)
        rpm --addsign --define "_gpg_name $KEY_ID" *.rpm
